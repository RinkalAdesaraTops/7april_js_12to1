<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let no = 19
        let sum=0
        let f=no
        while(no>0){
            let r=no%10
            no = Math.floor(no/10)
            sum = sum+r
        }
        //sum=19 91
        let rev=0
        let s=sum
        while(sum>0){
            r=sum%10
            sum = Math.floor(sum/10)
            rev = (rev*10)+r
        }
        document.write('<br>Sum of digits '+s)
        document.write('<br>Reverse '+rev)
        let m=s*rev
        document.write('<br>Multiply is '+m)
        if(f==m){
            document.write('<br>It is Magicno')
        } else {
            document.write('<br>It is not Magicno')

        }
    </script>
</body>
</html>
