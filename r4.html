<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // relational/comparision operator - <,>,<=,>=,==,!=,===,!==
        let a=40
        let b="40"
        document.write('<br> a > b is '+(a>b))
        document.write('<br> a < b is '+(a<b))
        document.write('<br> a >= b is '+(a>=b))
        document.write('<br> a <= b is '+(a<=b))
        document.write('<br> a == b is '+(a==b)) //check only values
        document.write('<br> a != b is '+(a!=b))
        document.write('<br> a === b is '+(a===b)) //check values & datatype
        document.write('<br> a !== b is '+(a!==b))
    </script>
</body>
</html>
