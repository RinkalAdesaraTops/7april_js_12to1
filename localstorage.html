<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Localstorage Example</h3>
    <div id="demo"></div>
    <button onclick="rmAge()">Remove Age</button>
    <button onclick="rmAll()">Remove All</button>
    <script>
        localStorage.setItem("name","jklm")
        localStorage.setItem("age",28)
        localStorage.setItem("salary",35000)

        let a = localStorage.getItem("name")
        let b = localStorage.getItem("age")
        document.getElementById('demo').innerHTML = "Your name is "+a+" && Age is "+b

        const rmAge = ()=>{
            localStorage.removeItem("age")
        }
        const rmAll = ()=>{
            localStorage.clear()
        }
    </script>
</body>
</html>
