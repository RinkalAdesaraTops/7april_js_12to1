<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 1)Arithmetic operator - +,-,*,/,%(modulus),**(exponant),++,--
        let a=34
        let b=20
        document.write('<br>Addition is '+(a+b))
        document.write('<br>Minus is '+(a-b))
        document.write('<br>MUltiply is '+(a*b))
        document.write('<br>Division is '+(a/b))
        document.write('<br>Modulus is '+(a%b)) //return reminder
        document.write('<br>A is '+a) //34
        b=a++ //postfix
        document.write('<br>A is '+a) //35
        document.write('<br>B - postfix is '+b) //34 old value
        b=++a //prefix
        document.write('<br>A is '+a) //36
        document.write('<br>B- Prefix is '+b) //36 new value
        b=20
        b= b**3 //b*b
        document.write('<br>B is '+b) //36 new value

    </script>
</body>
</html>
