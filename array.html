<body>
    <script>

        let arr = [10,20,30,40,45]

        // for(let i=0;i<5;i++){

        // for_in & for_of loop
        for(var x in arr){ //index-value 
            document.write('<br>index is '+x+' -  value is '+arr[x])

        document.write('<hr>')
        for(var x of arr){ //only elements
            document.write('<br> -  value is '+x)
        }
