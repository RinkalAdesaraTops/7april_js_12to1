<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="txt">Hii</div>
    <span id="hr">00</span>:
    <span id="min">00</span>:
    <span id="sc">00</span>
    <script>
        // BOM - browser object model
        // setTimeout & setInterval
        setTimeout(() => {
            document.getElementById("txt").innerHTML = "Hello"
        },3000)
        let count=1
        let min=1
        let hr=1
        setInterval(()=>{
            document.getElementById('sc').innerHTML = count++
            if(count>10){
                document.getElementById('min').innerHTML = min++
                count=1
                if(min>3){
                    document.getElementById('hr').innerHTML = hr++
                    min=1
                }
            }
        },1000)
    </script>
</body>

</html>
