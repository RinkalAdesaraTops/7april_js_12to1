<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4>Operators Example</h4>
    <script>
        // 1) Arithmetic - +,-,*,/,%,**,++,--
        let a=25
        let b=20
        document.write('<br>Addition is '+(a+b))
        // returns reminder
        document.write('<br>Modulus is '+(a%b))
        a=5
        b = a**2 //a*a*a
        document.write('<br>A is '+a)
        // document.write('<br>B is '+b)
        // ++ increment = +1
        // -- decrement = -1
        b=a++ //postfix 6
        document.write('<br>A is '+a)
        document.write('<br>B - postfix is '+b)
        b=++a //prefix 7
        document.write('<br>A is '+a)
        document.write('<br>B - prefix is '+b)

    </script>
</body>
</html>
