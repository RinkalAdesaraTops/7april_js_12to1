<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // a,b,c = max from 3 variable
        // a,b,c,d = max from 4 variable
        let a = 20
        let b = 5
        let c = 300
        if (a > b) { //20>5
            if (a > c) { //20>300
                document.write('<br>A is maximum')
            } else {
                document.write('<br>C is maximum')
            }
        } else {
            if (b > c) {
                document.write('<br>B is maximum')
            } else {
                document.write('<br>C is maximum')
            }
        }

    </script>
</body>

</html>
