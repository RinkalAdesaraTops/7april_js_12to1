<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // --
        let i=1
        while(i<=5){ //1<=5 6<=5 entry controlled loop
            document.write('<br>'+i) //1
            i++ //i+=1 6
        }
        document.write('<hr>')
        let j=10
        do{  //exit controlled loop
            document.write('<br>'+j)
            j+=2
        } while(j<=20) //12<=20
        document.write('<hr>')
        for(let i=1;i<=5;i++){ //entry controlled loop
            document.write('<br>'+i) //1
        }
    </script>
</body>
</html>
