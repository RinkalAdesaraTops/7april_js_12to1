<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // assignment/shorthand operator = +=,-=,*=,/=,%=,**=
        let a = 6
        a += 2 //a=a+2
        document.write('<br>A is ' + a)
        a -= 5
        document.write('<br>A is ' + a)
        a **= 3
        document.write('<br>A is ' + a)
        // relational/comparision = <,>,<=,>=,==,!=,===,!==
        a = 10
        b = "10"
        document.write('<br> a > b is ' + (a > b)) //25>10
        document.write('<br> a < b is ' + (a < b))//25<10
        document.write('<br> a >= b is ' + (a >= b)) //25>10
        document.write('<br> a <= b is ' + (a <= b))//25<10
        // check only value
        document.write('<br> a == b is '+(a==b)) //25>10
        document.write('<br> a != b is '+(a!=b))//25<10
        // check value & datatype both
        document.write('<br> a === b is '+(a===b)) //25>10
        document.write('<br> a !== b is '+(a!==b))//25<10
    </script>
</body>

</html>
