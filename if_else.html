<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = parseInt(prompt("Enter a:"))
        let b = parseInt(prompt("Enter b:"))
        if(a>b){
            document.write('<br>A is maximum')
            //true block
        } else {
            document.write('<br>B is maximum')
            //false block
        }
        let no = 310
        if(no%2!=0){
            document.write('<br>Odd no')
        } else {
            document.write('<br>Even no')
        }
        let age = 20
        if(age>=18)
            document.write('<br>Eligible 4 vote')
        else
            document.write('<br>Not Eligible 4 vote')

    </script>
</body>
</html>
