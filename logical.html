<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // logical operator = &&(and),||(or),!(not)
        let a=34
        let b=30
        let c=200
        document.write('<br> a > b && a >  c is -- '+(a>b && a>c))
        document.write('<br> a > b || a >  c is -- '+(a>b || a>c))
        document.write('<br> ! a > b || a >  c is -- '+ !(a>b || a>c))
        // ternary operator = ?:
        // (condition)? true block : false block
        document.write(a>b?'<br>A is maximum':'<br>B is maximum')
        let age = 15
        document.write((age>=18)?'<br>Eligible 4 vote':'<br>Not eligible 4 vote')
        let no=561
        document.write((no%2 == 0 )?'<br>It is even no ':'<br>It is odd no')
        // even or odd
    </script>
</body>
</html>
