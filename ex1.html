<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Move Box</title>
  <style>
    #box {
      height: 50px;
      width: 50px;
      background-color: steelblue;
      position: absolute;
      top: 100px;
      left: 0;
    }
  </style>
</head>
<body>

<div id="box"></div>

<script>
  let position = 0;
  const box = document.getElementById("box");

  const move = setInterval(() => {
    position += 5;
    box.style.left = position + "px";

    // Stop at edge of screen
    if (position >= window.innerWidth - 50) {
      clearInterval(move);
    }
  }, 20); // smaller delay = smoother animation
</script>

</body>
</html>
