<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Shorthand/Assignment operator +=,-=,*=,/=,%=,**=
        let a=10
        document.write('<br>A is '+a)
        a+=5 //a=a+5 //15
        document.write('<br>A is '+a)
        a-=2 //a=a-2 a=15-2 a=13
        document.write('<br>A is '+a)
        a*=4
        document.write('<br>A is '+a)
        // typeof operator 
        document.write('<br>Numberic value '+typeof(456))
        document.write('<br>Numberic value '+typeof(56.25))
        document.write('<br>character value '+typeof('R'))
        document.write('<br>String value '+typeof("styuret"))
        document.write('<br>Boolean value '+typeof(true))
        document.write('<br>Boolean value '+typeof(false))
        let x
        document.write('<br>x value '+typeof(x))
        document.write('<br>Array value '+typeof([]))
        document.write('<br>Object value '+typeof({}))


    </script>
</body>
</html>
