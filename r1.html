<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        a = 10
        b = 20
        c = a + b
        document.write('<br>Addition is ', c)
        c = a * b
        document.write('<br>Multiplication is ' + c)
        // -,/
        // var keyword - redeclare & reassign are possible
        var x = "hi"
        document.write('<br>X is ' + x)
        var x = 452
        document.write('<br>X is ' + x)
        //const keyword = redeclare & reassign are not possible
        const pi=3.14  
        document.write('<br>Pi value is '+pi)
        // pi=5678476
        // document.write('<br>Pi value is '+pi)
        //let keyword - cant redeclare but reassign is possible 
        let str = "sdhgfjshd"
        document.write('<br>Str is '+str)
        str = 56
        document.write('<br>Str is '+str)

    </script>
</body>

</html>
